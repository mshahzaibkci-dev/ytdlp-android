name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/bin
          key: binaries-v4

      - name: Fetch yt-dlp binaries
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets/bin/arm64-v8a
          mkdir -p app/src/main/assets/bin/armeabi-v7a
          mkdir -p app/src/main/assets/bin/x86_64

          BASE="https://github.com/yt-dlp/yt-dlp/releases/latest/download"

          curl -fL "${BASE}/yt-dlp_linux_aarch64" -o app/src/main/assets/bin/arm64-v8a/yt-dlp
          chmod +x app/src/main/assets/bin/arm64-v8a/yt-dlp
          echo "✓ arm64-v8a/yt-dlp"

          # yt-dlp has no armv7l build — copy arm64 (works on all modern devices)
          cp app/src/main/assets/bin/arm64-v8a/yt-dlp app/src/main/assets/bin/armeabi-v7a/yt-dlp
          echo "✓ armeabi-v7a/yt-dlp (copied from arm64)"

          curl -fL "${BASE}/yt-dlp_linux" -o app/src/main/assets/bin/x86_64/yt-dlp
          chmod +x app/src/main/assets/bin/x86_64/yt-dlp
          echo "✓ x86_64/yt-dlp"

      - name: Fetch FFmpeg binaries
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          cp $(which ffmpeg) app/src/main/assets/bin/x86_64/ffmpeg
          chmod +x app/src/main/assets/bin/x86_64/ffmpeg
          echo "✓ x86_64/ffmpeg (system apt)"

          curl -fL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz" \
               -o /tmp/ffmpeg-arm64.tar.xz
          mkdir -p /tmp/ffmpeg-arm64
          tar -xf /tmp/ffmpeg-arm64.tar.xz -C /tmp/ffmpeg-arm64 --strip-components=1
          cp /tmp/ffmpeg-arm64/ffmpeg app/src/main/assets/bin/arm64-v8a/ffmpeg
          chmod +x app/src/main/assets/bin/arm64-v8a/ffmpeg
          echo "✓ arm64-v8a/ffmpeg"

          cp app/src/main/assets/bin/arm64-v8a/ffmpeg app/src/main/assets/bin/armeabi-v7a/ffmpeg
          echo "✓ armeabi-v7a/ffmpeg (copied from arm64)"

      - name: Verify all binaries
        run: |
          ALL_OK=true
          for arch in arm64-v8a armeabi-v7a x86_64; do
            for bin in yt-dlp ffmpeg; do
              FILE="app/src/main/assets/bin/${arch}/${bin}"
              if [ -f "$FILE" ]; then
                echo "✓ ${arch}/${bin} ($(du -sh $FILE | cut -f1))"
              else
                echo "✗ MISSING: ${arch}/${bin}"
                ALL_OK=false
              fi
            done
          done
          $ALL_OK || exit 1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YTDownloader-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
